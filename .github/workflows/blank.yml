name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run a one-line script
        run: echo Hello, world!
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.

  install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Import check
        run: python -c "import main, db; print('imports ok')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  smoke-test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Boot app and hit routes
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          APP_PID=$!
          for i in {1..20}; do
            curl -sf http://127.0.0.1:8000/ > /dev/null && break || sleep 0.5
          done
          set -e
          curl -sf -o /dev/null -w "GET / -> %{http_code}\n" http://127.0.0.1:8000/
          curl -sf -o /dev/null -w "GET /bookmarks -> %{http_code}\n" http://127.0.0.1:8000/bookmarks
          curl -sf -o /dev/null -w "GET /tags -> %{http_code}\n" http://127.0.0.1:8000/tags
          curl -sf -o /dev/null -w "GET /bookmarks/new -> %{http_code}\n" http://127.0.0.1:8000/bookmarks/new
          curl -sf -o /dev/null -X POST -d "url=https://example.com&title=Example&tags=ci" -w "POST /bookmarks -> %{http_code}\n" http://127.0.0.1:8000/bookmarks
          kill $APP_PID

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit & bandit
        run: pip install pip-audit bandit
      - name: Audit dependencies
        run: pip-audit -r requirements.txt || true
      - name: Bandit static analysis
        run: bandit -r . -x .venv,tests || true
